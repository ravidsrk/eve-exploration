name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Structure + profile unit tests
        run: npm run test:structure

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

  eval-s-tier:
    if: |
      github.event_name == 'pull_request' &&
      vars.EVAL_S_TIER_ENABLED == 'true' &&
      secrets.OPENROUTER_API_KEY != ''
    runs-on: ubuntu-latest
    needs: [structure]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: S-tier live evals
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPERSERVE_API_KEY: ${{ secrets.SUPERSERVE_API_KEY }}
        run: npm run eval:s-tier

  eval-catalog-rotate:
    if: |
      github.event_name == 'pull_request' &&
      vars.EVAL_ROTATE_ENABLED == 'true' &&
      secrets.OPENROUTER_API_KEY != ''
    runs-on: ubuntu-latest
    needs: [structure]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rotating catalog smoke evals (10)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPERSERVE_API_KEY: ${{ secrets.SUPERSERVE_API_KEY }}
        run: npm run eval:catalog:rotate -- 10 ${{ github.run_number }}

  deploy-preview:
    if: github.event_name == 'pull_request' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: [structure, typecheck]
    strategy:
      matrix:
        include:
          - agent: 06-incident-commander
            project_secret: VERCEL_PROJECT_ID_FLAGSHIP
          - agent: 04-support-ticket-triage
            project_secret: VERCEL_PROJECT_ID_SUPPORT
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuilt deploy ${{ matrix.agent }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_secret] }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/deploy-catalog.sh "${{ matrix.agent }}"

      - name: Comment preview URL
        if: matrix.agent == '06-incident-commander'
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL || '(see Vercel dashboard)';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Flagship preview** — run \`npm run smoke:deployed -- <url>\` after setting ROUTE_AUTH_BASIC_* on the project.`
            });

  validate-reference:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.OPENROUTER_API_KEY != '') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [structure, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reference evals (strict)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPERSERVE_API_KEY: ${{ secrets.SUPERSERVE_API_KEY }}
        run: npm run validate:reference