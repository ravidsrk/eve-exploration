<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>eve · streaming chat</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: #0b0f17; color: #e6edf3; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 14px 18px; border-bottom: 1px solid #232a36; font-weight: 600; display:flex; gap:8px; align-items:center; }
  header .dot { width:9px; height:9px; border-radius:50%; background:#3fb950; box-shadow:0 0 8px #3fb950; }
  header small { color:#8b949e; font-weight:400; margin-left:auto; }
  #log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 760px; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 3px; }
  .bot { align-self: flex-start; background: #161b22; border: 1px solid #232a36; border-bottom-left-radius: 3px; }
  .tool { align-self: flex-start; font-size: 12px; color: #8b949e; font-family: ui-monospace, monospace; }
  form { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid #232a36; }
  input { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1px solid #232a36; background: #0d1117; color: inherit; font: inherit; }
  button { padding: 11px 18px; border-radius: 10px; border: 0; background: #238636; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header><span class="dot"></span> eve streaming chat <small id="status">ready</small></header>
  <div id="log"></div>
  <form id="f">
    <input id="i" autocomplete="off" placeholder="Ask something… (e.g. weather in Tokyo)" />
    <button id="send" type="submit">Send</button>
  </form>
<script>
const log = document.getElementById("log");
const input = document.getElementById("i");
const status = document.getElementById("status");
const sendBtn = document.getElementById("send");
let continuationToken = null, sessionId = null;

function bubble(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text || "";
  log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
}

// Consume the NDJSON stream for `sessionId`. If `liveBot` is provided, stream into it
// (live send); otherwise create bubbles as events arrive (replay of an existing session).
async function consumeStream(liveBot) {
  const stream = await fetch(`/eve/v1/session/${sessionId}/stream`);
  const reader = stream.body.getReader();
  const dec = new TextDecoder();
  let buf = "", botEl = liveBot || null;
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf("\n")) >= 0) {
      const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
      if (!line) continue;
      let e; try { e = JSON.parse(line); } catch { continue; }
      if (e.type === "message.received" && !liveBot) { bubble("user", e.data.message); botEl = null; }
      else if (e.type === "actions.requested") { for (const a of (e.data.actions||[])) bubble("tool", "→ tool: " + a.toolName + " " + JSON.stringify(a.input)); }
      else if (e.type === "message.appended") { if (!botEl) botEl = bubble("bot", ""); botEl.textContent = e.data.messageSoFar; log.scrollTop = log.scrollHeight; }
      else if (e.type === "message.completed") { if (!botEl) botEl = bubble("bot", ""); botEl.textContent = e.data.message; botEl = null; }
    }
  }
}

async function send(message) {
  bubble("user", message);
  sendBtn.disabled = true; status.textContent = "thinking…";
  const botEl = bubble("bot", "");
  try {
    const url = sessionId ? `/eve/v1/session/${sessionId}` : `/eve/v1/session`;
    const body = sessionId ? { continuationToken, message } : { message };
    const res = await fetch(url, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
    const j = await res.json();
    if (j.sessionId) sessionId = j.sessionId;
    if (j.continuationToken) continuationToken = j.continuationToken;
    await consumeStream(botEl);
  } catch (err) {
    botEl.textContent = "[error] " + err;
  } finally {
    sendBtn.disabled = false; status.textContent = "ready"; input.focus();
  }
}

document.getElementById("f").addEventListener("submit", (ev) => {
  ev.preventDefault();
  const m = input.value.trim(); if (!m) return; input.value = ""; send(m);
});

const params = new URLSearchParams(location.search);
const q = params.get("q");
const replaySid = params.get("session");
if (replaySid) { sessionId = replaySid; status.textContent = "replay"; consumeStream(null); }
else if (q) send(q);
</script>
</body>
</html>
